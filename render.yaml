services:
  - type: web
    name: huligan-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false

  - type: static
    name: huligan-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://huligan-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
